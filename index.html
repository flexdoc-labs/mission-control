<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Super — Mission Control</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
        }
        .header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #f0f6fc;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .last-updated {
            font-size: 12px;
            color: #8b949e;
        }
        .container {
            display: flex;
            height: calc(100vh - 65px);
        }
        .sidebar {
            width: 240px;
            min-width: 240px;
            background: #161b22;
            border-right: 1px solid #30363d;
            padding: 16px 0;
        }
        .nav-item {
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 14px;
            color: #8b949e;
            transition: all 0.2s;
        }
        .nav-item:hover, .nav-item.active {
            background: #21262d;
            color: #f0f6fc;
        }
        .main {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
        }
        .stat-card h3 {
            font-size: 12px;
            font-weight: 500;
            color: #8b949e;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: #f0f6fc;
        }
        .trend.up { color: #238636; }
        .trend.down { color: #da3633; }
        .trend { font-size: 12px; margin-top: 4px; }
        
        .cron-list {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 16px;
        }
        .cron-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #30363d;
        }
        .cron-item:last-child { border-bottom: none; }
        .cron-name { font-weight: 500; }
        .cron-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .status-healthy { background: #238636; }
        .status-error { background: #da3633; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 Flex Super — Mission Control</h1>
        <div class="last-updated">Last updated: 2026-03-08 12:08 UTC</div>
    </div>
    
    <div class="container">
        <div class="sidebar">
            <div class="nav-item active">📊 Dashboard</div>
            <div class="nav-item">🤖 Cron Jobs (0)</div>
            <div class="nav-item">📁 Projects</div>
            <div class="nav-item">💼 Deals</div>
            <div class="nav-item">📅 Calendar</div>
        </div>
        
        <div class="main">
            <div class="stats">
                <div class="stat-card">
                    <h3>Active Cron Jobs</h3>
                    <div class="value">0</div>
                    <div class="trend up">↗ 0 healthy</div>
                </div>
                <div class="stat-card">
                    <h3>Days to ColCap</h3>
                    <div class="value">50</div>
                    <div class="trend down">Apr 28 meeting</div>
                </div>
                <div class="stat-card">
                    <h3>Active Projects</h3>
                    <div class="value">4</div>
                    <div class="trend up">2 in progress</div>
                </div>
                <div class="stat-card">
                    <h3>Market Intel</h3>
                    <div class="value">Daily</div>
                    <div class="trend up">AFR + X + Brokers</div>
                </div>
            </div>
            
            <h3 style="margin-bottom: 16px;">🤖 Cron Job Status</h3>
            <div class="cron-list">
            </div>
        </div>
    </div>
</body>
</html>
